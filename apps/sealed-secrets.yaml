apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  # sync-wave منفی یعنی قبل از همه چیز نصب بشه
  # هرچی wave کوچک‌تر، زودتر apply می‌شه
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default

  # multi-source pattern مثل monitoring
  sources:
    # منبع ۱: helm chart از bitnami-labs (sealed-secrets رسمی)
    - repoURL: https://bitnami-labs.github.io/sealed-secrets
      chart: sealed-secrets
      targetRevision: 2.18.6   # chart version (controller v0.36.0)
      helm:
        releaseName: sealed-secrets
        valueFiles:
          - $values/manifests/sealed-secrets/values.yaml

    # منبع ۲: values از repo خودمون
    - repoURL: https://github.com/siraliebadi/homalab-gitops.git
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

    retry:
      limit: 5
      backoff:
        duration: 30s
        maxDuration: 5m
        factor: 2